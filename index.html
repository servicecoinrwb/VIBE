
<style>
*{box-sizing:border-box;margin:0;padding:0;}
.app{font-family:var(--font-sans);display:flex;flex-direction:column;gap:10px;padding:.75rem 0;}
.header{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);}
.logo{font-family:var(--font-mono);font-size:15px;font-weight:500;color:var(--color-text-primary);}
.logo span{color:#1D9E75;}
.wallet{display:flex;align-items:center;gap:8px;}
.bal-val{font-size:16px;font-weight:500;color:#1D9E75;font-family:var(--font-mono);}
.bal-tick{font-size:11px;color:var(--color-text-secondary);}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.stat-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:9px 12px;}
.stat-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:3px;}
.stat-val{font-size:18px;font-weight:500;color:var(--color-text-primary);font-family:var(--font-mono);}
.stat-val.green{color:#1D9E75;}
.stat-val.amber{color:#BA7517;}
.main{display:grid;grid-template-columns:230px 1fr;gap:10px;min-height:540px;}
.sidebar{display:flex;flex-direction:column;gap:5px;overflow-y:auto;max-height:580px;}
.sidebar-title{font-size:10px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:1px;padding:0 2px;margin-bottom:3px;}
.ch-item{padding:9px 11px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);cursor:pointer;transition:border-color .15s;}
.ch-item:hover{border-color:var(--color-border-secondary);}
.ch-item.active{border-color:#1D9E75;background:var(--color-background-secondary);}
.ch-item.done .ch-name{opacity:.7;}
.done-badge{font-size:10px;color:#1D9E75;margin-left:4px;}
.ch-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;}
.ch-name{font-size:12px;font-weight:500;color:var(--color-text-primary);}
.ch-reward{font-size:11px;font-family:var(--font-mono);color:#1D9E75;}
.ch-diff{font-size:10px;padding:2px 5px;border-radius:4px;font-weight:500;}
.diff-easy{background:#EAF3DE;color:#3B6D11;}
.diff-med{background:#FAEEDA;color:#854F0B;}
.diff-hard{background:#FAECE7;color:#993C1D;}
.panel{display:flex;flex-direction:column;gap:10px;}
.tabs{display:flex;gap:4px;border-bottom:0.5px solid var(--color-border-tertiary);}
.tab-btn{padding:6px 12px;font-size:12px;color:var(--color-text-secondary);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;}
.tab-btn.active{color:#1D9E75;border-bottom-color:#1D9E75;font-weight:500;}
.tab-content{display:none;flex-direction:column;gap:10px;}
.tab-content.show{display:flex;}
.challenge-box{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:11px 13px;}
.ch-title-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.ch-title{font-size:13px;font-weight:500;color:var(--color-text-primary);}
.timer-pill{font-family:var(--font-mono);font-size:12px;padding:3px 9px;border-radius:99px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);color:var(--color-text-secondary);}
.timer-pill.running{color:#1D9E75;border-color:#9FE1CB;}
.timer-pill.warn{color:#BA7517;border-color:#FAC775;}
.timer-pill.danger{color:#A32D2D;border-color:#F7C1C1;}
.ch-desc{font-size:12px;color:var(--color-text-secondary);line-height:1.6;}
.ch-meta{display:flex;gap:10px;margin-top:7px;flex-wrap:wrap;}
.ch-meta span{font-size:10px;color:var(--color-text-tertiary);}
.ch-meta b{color:var(--color-text-secondary);}
.hint-section{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);overflow:hidden;}
.hint-header{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;cursor:pointer;}
.hint-header-left{font-size:12px;font-weight:500;color:var(--color-text-secondary);}
.hint-cost{font-size:10px;color:#BA7517;font-family:var(--font-mono);}
.hint-body{padding:0 12px;max-height:0;overflow:hidden;transition:max-height .3s,padding .3s;}
.hint-body.open{max-height:200px;padding:0 12px 10px;}
.hint-item{padding:6px 0;border-top:0.5px solid var(--color-border-tertiary);font-size:12px;color:var(--color-text-secondary);line-height:1.5;display:flex;gap:8px;align-items:flex-start;}
.hint-num{font-family:var(--font-mono);font-size:10px;color:#BA7517;margin-top:2px;flex-shrink:0;}
.hint-unlock-btn{font-size:11px;padding:3px 9px;border:0.5px solid #FAC775;background:#FAEEDA;color:#854F0B;border-radius:4px;cursor:pointer;}
.hint-unlock-btn:hover{background:#FAC775;}
.editor-label{font-size:10px;color:var(--color-text-secondary);font-family:var(--font-mono);}
.code-editor{width:100%;min-height:160px;padding:11px;font-family:var(--font-mono);font-size:12px;line-height:1.6;background:var(--color-background-primary);color:var(--color-text-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);resize:vertical;outline:none;tab-size:2;}
.code-editor:focus{border-color:#1D9E75;}
.btn-row{display:flex;gap:8px;align-items:center;}
.run-btn{padding:8px 18px;background:#1D9E75;color:#fff;border:none;border-radius:var(--border-radius-md);font-size:12px;font-weight:500;cursor:pointer;transition:opacity .15s;}
.run-btn:hover{opacity:.85;}
.reset-btn{padding:8px 14px;background:none;color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);font-size:12px;cursor:pointer;}
.reset-btn:hover{border-color:var(--color-border-secondary);}
.results-box{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 13px;}
.results-title{font-size:11px;font-weight:500;color:var(--color-text-secondary);margin-bottom:7px;}
.test-row{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:0.5px solid var(--color-border-tertiary);}
.test-row:last-child{border-bottom:none;}
.test-icon{width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;flex-shrink:0;}
.pass-icon{background:#EAF3DE;color:#3B6D11;}
.fail-icon{background:#FCEBEB;color:#A32D2D;}
.test-expr{font-family:var(--font-mono);font-size:11px;color:var(--color-text-secondary);flex:1;}
.test-status{font-size:10px;color:var(--color-text-tertiary);}
.reward-banner{background:#EAF3DE;border:0.5px solid #C0DD97;border-radius:var(--border-radius-md);padding:9px 13px;display:flex;align-items:center;gap:10px;}
.reward-text{font-size:12px;color:#3B6D11;font-weight:500;}
.reward-sub{font-size:11px;color:#639922;}
.placeholder{font-size:13px;color:var(--color-text-tertiary);padding:12px 0;}
.lb-row{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:0.5px solid var(--color-border-tertiary);}
.lb-row:last-child{border-bottom:none;}
.lb-rank{font-size:12px;font-weight:500;color:var(--color-text-secondary);width:22px;text-align:center;}
.lb-avatar{width:26px;height:26px;border-radius:50%;background:#E6F1FB;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;color:#185FA5;}
.lb-name{font-size:12px;color:var(--color-text-primary);flex:1;}
.lb-name.you{font-weight:500;color:#1D9E75;}
.lb-score{font-family:var(--font-mono);font-size:12px;color:#1D9E75;font-weight:500;}
.lb-solved{font-size:10px;color:var(--color-text-tertiary);}
.filter-row{display:flex;gap:5px;flex-wrap:wrap;}
.filter-btn{padding:4px 10px;font-size:11px;border:0.5px solid var(--color-border-tertiary);border-radius:99px;background:none;color:var(--color-text-secondary);cursor:pointer;}
.filter-btn.active-filter{background:#1D9E75;color:#fff;border-color:#1D9E75;}
.section-label{font-size:10px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:1px;}
</style>

<div class="app">
<div class="header">
  <div class="logo">vibe<span>crypto</span>.dev</div>
  <div class="wallet">
    <span style="font-size:12px;color:var(--color-text-secondary);">Balance</span>
    <span class="bal-val" id="bal">0</span>
    <span class="bal-tick">VIB</span>
  </div>
</div>

<div class="stats-row">
  <div class="stat-card"><div class="stat-label">Earned</div><div class="stat-val green" id="stat-earned">0 VIB</div></div>
  <div class="stat-card"><div class="stat-label">Solved</div><div class="stat-val" id="stat-solved">0 / 10</div></div>
  <div class="stat-card"><div class="stat-label">Rank</div><div class="stat-val" id="stat-rank">#7</div></div>
  <div class="stat-card"><div class="stat-label">Best time</div><div class="stat-val amber" id="stat-time">—</div></div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-title">Challenges</div>
    <div class="filter-row" style="margin-bottom:4px;">
      <button class="filter-btn active-filter" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('easy',this)">Easy</button>
      <button class="filter-btn" onclick="setFilter('medium',this)">Medium</button>
      <button class="filter-btn" onclick="setFilter('hard',this)">Hard</button>
    </div>
    <div id="challenge-list"></div>
  </div>

  <div class="panel">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('editor')">Editor</button>
      <button class="tab-btn" onclick="switchTab('leaderboard')">Leaderboard</button>
    </div>

    <div class="tab-content show" id="tab-editor">
      <div id="ch-info"><p class="placeholder">← Select a challenge to begin</p></div>
      <div id="editor-section" style="display:none;flex-direction:column;gap:9px;">
        <div class="hint-section" id="hint-section"></div>
        <div class="editor-label">// your solution</div>
        <textarea class="code-editor" id="code-input" spellcheck="false"></textarea>
        <div class="btn-row">
          <button class="run-btn" onclick="runCode()">Run & Submit</button>
          <button class="reset-btn" onclick="resetCode()">Reset</button>
        </div>
        <div id="results-area"></div>
      </div>
    </div>

    <div class="tab-content" id="tab-leaderboard">
      <div id="leaderboard-list"></div>
    </div>
  </div>
</div>
</div>

<script>
const challenges = [
  {id:0,name:"Sum Two Numbers",diff:"easy",reward:50,time:120,
   desc:"Write a function <code>sum(a, b)</code> that returns the sum of two numbers.",
   starter:"function sum(a, b) {\n  \n}",
   hints:["Think about what the + operator does.","Just return a + b.","return a + b;"],
   tests:[{expr:"sum(1,2)",expected:3},{expr:"sum(-5,5)",expected:0},{expr:"sum(10,20)",expected:30},{expr:"sum(0,0)",expected:0}]},
  {id:1,name:"Reverse a String",diff:"easy",reward:75,time:120,
   desc:"Write a function <code>reverseStr(s)</code> that returns the string reversed.",
   starter:"function reverseStr(s) {\n  \n}",
   hints:["Strings have a split method.","Try split(''), reverse(), join('').","return s.split('').reverse().join('');"],
   tests:[{expr:"reverseStr('hello')",expected:"olleh"},{expr:"reverseStr('abc')",expected:"cba"},{expr:"reverseStr('a')",expected:"a"},{expr:"reverseStr('')",expected:""}]},
  {id:2,name:"Array Maximum",diff:"easy",reward:75,time:120,
   desc:"Write a function <code>maxArr(arr)</code> that returns the largest number in the array.",
   starter:"function maxArr(arr) {\n  \n}",
   hints:["Math.max() can accept multiple arguments.","Spread the array: Math.max(...arr).","return Math.max(...arr);"],
   tests:[{expr:"maxArr([1,3,2])",expected:3},{expr:"maxArr([-1,-5,0])",expected:0},{expr:"maxArr([100])",expected:100}]},
  {id:3,name:"Count Vowels",diff:"easy",reward:80,time:150,
   desc:"Write a function <code>countVowels(str)</code> that returns the number of vowels (a,e,i,o,u) in a string (case-insensitive).",
   starter:"function countVowels(str) {\n  \n}",
   hints:["Convert to lowercase first.","Use a regex match: /[aeiou]/gi","return (str.match(/[aeiou]/gi)||[]).length;"],
   tests:[{expr:"countVowels('hello')",expected:2},{expr:"countVowels('AEIou')",expected:5},{expr:"countVowels('xyz')",expected:0},{expr:"countVowels('')",expected:0}]},
  {id:4,name:"Palindrome Check",diff:"easy",reward:90,time:150,
   desc:"Write a function <code>isPalindrome(s)</code> that returns <code>true</code> if the string reads the same forwards and backwards.",
   starter:"function isPalindrome(s) {\n  \n}",
   hints:["Reverse the string and compare.","Use split/reverse/join to reverse.","return s === s.split('').reverse().join('');"],
   tests:[{expr:"isPalindrome('racecar')",expected:true},{expr:"isPalindrome('hello')",expected:false},{expr:"isPalindrome('a')",expected:true},{expr:"isPalindrome('')",expected:true}]},
  {id:5,name:"Is Prime?",diff:"medium",reward:150,time:180,
   desc:"Write a function <code>isPrime(n)</code> that returns <code>true</code> if n is prime.",
   starter:"function isPrime(n) {\n  \n}",
   hints:["Numbers less than 2 are not prime.","Loop from 2 to Math.sqrt(n) and check divisibility.","if(n<2) return false; for(let i=2;i<=Math.sqrt(n);i++) if(n%i===0) return false; return true;"],
   tests:[{expr:"isPrime(2)",expected:true},{expr:"isPrime(7)",expected:true},{expr:"isPrime(4)",expected:false},{expr:"isPrime(1)",expected:false},{expr:"isPrime(13)",expected:true}]},
  {id:6,name:"FizzBuzz Array",diff:"medium",reward:150,time:180,
   desc:"Write a function <code>fizzBuzz(n)</code> that returns an array for 1 to n. Multiples of 3 → 'Fizz', 5 → 'Buzz', both → 'FizzBuzz', else the number as string.",
   starter:"function fizzBuzz(n) {\n  \n}",
   hints:["Use the modulo operator % to check divisibility.","Check for FizzBuzz (both) before checking either alone.","Build an array with a loop from 1 to n."],
   tests:[{expr:"fizzBuzz(3)[2]",expected:"Fizz"},{expr:"fizzBuzz(5)[4]",expected:"Buzz"},{expr:"fizzBuzz(15)[14]",expected:"FizzBuzz"},{expr:"fizzBuzz(5)[0]",expected:"1"}]},
  {id:7,name:"Flatten Array",diff:"medium",reward:175,time:200,
   desc:"Write a function <code>flatten(arr)</code> that takes a nested array and returns a single flat array.",
   starter:"function flatten(arr) {\n  \n}",
   hints:["Arrays have a flat() method.","flat() takes a depth argument — use Infinity.","return arr.flat(Infinity);"],
   tests:[{expr:"JSON.stringify(flatten([1,[2,3]]))",expected:"[1,2,3]"},{expr:"JSON.stringify(flatten([[1,[2]],3]))",expected:"[1,2,3]"},{expr:"JSON.stringify(flatten([1,2,3]))",expected:"[1,2,3]"}]},
  {id:8,name:"Two Sum",diff:"hard",reward:300,time:300,
   desc:"Write a function <code>twoSum(nums, target)</code> that returns indices of two numbers that add up to target. Assume exactly one solution exists.",
   starter:"function twoSum(nums, target) {\n  \n}",
   hints:["A brute force O(n²) nested loop works.","For O(n), use a Map to store seen values.","For each num, check if (target - num) is already in the map."],
   tests:[{expr:"JSON.stringify(twoSum([2,7,11,15],9))",expected:"[0,1]"},{expr:"JSON.stringify(twoSum([3,2,4],6))",expected:"[1,2]"},{expr:"JSON.stringify(twoSum([3,3],6))",expected:"[0,1]"}]},
  {id:9,name:"Longest Substring",diff:"hard",reward:350,time:300,
   desc:"Write a function <code>lengthOfLongestSubstring(s)</code> that returns the length of the longest substring without repeating characters.",
   starter:"function lengthOfLongestSubstring(s) {\n  \n}",
   hints:["Use a sliding window approach.","Keep a Set of characters in the current window.","Move left pointer forward when a duplicate is found."],
   tests:[{expr:"lengthOfLongestSubstring('abcabcbb')",expected:3},{expr:"lengthOfLongestSubstring('bbbbb')",expected:1},{expr:"lengthOfLongestSubstring('pwwkew')",expected:3},{expr:"lengthOfLongestSubstring('')",expected:0}]},
];

let balance=0, solved=new Set(), activeId=null, filterDiff="all";
let timerInterval=null, timerStart=null, bestTimes={};
let unlockedHints={}, hintsOpen=false;
const HINT_COST=10;

const lbData=[
  {name:"0xViper",score:1250,solved:8,initials:"VX"},
  {name:"cryptoDev",score:875,solved:5,initials:"CD"},
  {name:"byteKing",score:725,solved:4,initials:"BK"},
  {name:"web3guru",score:500,solved:3,initials:"WG"},
  {name:"solidity_sx",score:375,solved:2,initials:"SS"},
  {name:"nftBuilder",score:150,solved:1,initials:"NB"},
  {name:"You",score:0,solved:0,initials:"YO",isYou:true},
];

function diffLabel(d){
  if(d==="easy") return '<span class="ch-diff diff-easy">Easy</span>';
  if(d==="medium") return '<span class="ch-diff diff-med">Med</span>';
  return '<span class="ch-diff diff-hard">Hard</span>';
}

function fmtTime(sec){
  const m=Math.floor(sec/60), s=sec%60;
  return m>0?`${m}m ${s}s`:`${s}s`;
}

function setFilter(diff, btn){
  filterDiff=diff;
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active-filter"));
  btn.classList.add("active-filter");
  renderSidebar();
}

function renderSidebar(){
  const list=challenges.filter(c=>filterDiff==="all"||c.diff===filterDiff);
  document.getElementById("challenge-list").innerHTML=list.map(c=>`
    <div class="ch-item${c.id===activeId?" active":""}${solved.has(c.id)?" done":""}" onclick="selectChallenge(${c.id})">
      <div class="ch-top">
        <span class="ch-name">${c.name}${solved.has(c.id)?'<span class="done-badge">✓</span>':""}</span>
        ${diffLabel(c.diff)}
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span class="ch-reward">+${c.reward} VIB</span>
        ${bestTimes[c.id]?`<span style="font-size:10px;color:var(--color-text-tertiary);">${fmtTime(bestTimes[c.id])}</span>`:""}
      </div>
    </div>
  `).join("");
}

function startTimer(){
  stopTimer();
  timerStart=Date.now();
  timerInterval=setInterval(updateTimer,500);
}

function stopTimer(){
  if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
}

function updateTimer(){
  if(activeId===null) return;
  const elapsed=Math.floor((Date.now()-timerStart)/1000);
  const limit=challenges[activeId].time;
  const remaining=Math.max(0,limit-elapsed);
  const pill=document.getElementById("timer-display");
  if(!pill) return;
  pill.textContent=fmtTime(remaining);
  pill.className="timer-pill"+(remaining<=0?" danger":remaining<=limit*0.3?" warn":" running");
}

function renderHints(){
  const c=challenges[activeId];
  const unlocked=unlockedHints[activeId]||0;
  const hintItems=c.hints.map((h,i)=>{
    if(i<unlocked){
      return `<div class="hint-item"><span class="hint-num">${i+1}</span><span>${h}</span></div>`;
    }
    return `<div class="hint-item"><span class="hint-num">${i+1}</span><button class="hint-unlock-btn" onclick="unlockHint(${i})">Unlock (-${HINT_COST} VIB)</button></div>`;
  }).join("");
  document.getElementById("hint-section").innerHTML=`
    <div class="hint-header" onclick="toggleHints()">
      <span class="hint-header-left">Hints (${unlocked}/${c.hints.length} unlocked)</span>
      <span class="hint-cost">${HINT_COST} VIB each</span>
    </div>
    <div class="hint-body${hintsOpen?" open":""}" id="hint-body">${hintItems}</div>
  `;
}

function toggleHints(){
  hintsOpen=!hintsOpen;
  renderHints();
}

function unlockHint(i){
  if(balance<HINT_COST){
    alert("Not enough VIB! Earn more by solving challenges.");
    return;
  }
  const cur=unlockedHints[activeId]||0;
  if(i!==cur){return;}
  balance-=HINT_COST;
  unlockedHints[activeId]=(cur+1);
  document.getElementById("bal").textContent=balance;
  document.getElementById("stat-earned").textContent=balance+" VIB";
  renderHints();
}

function selectChallenge(id){
  activeId=id;
  hintsOpen=false;
  const c=challenges[id];
  document.getElementById("ch-info").innerHTML=`
    <div class="challenge-box">
      <div class="ch-title-row">
        <span class="ch-title">${c.name}</span>
        <span class="timer-pill running" id="timer-display">${fmtTime(c.time)}</span>
      </div>
      <div class="ch-desc">${c.desc}</div>
      <div class="ch-meta">
        ${diffLabel(c.diff)}
        <span><b>Reward:</b> ${c.reward} VIB</span>
        <span><b>Time limit:</b> ${fmtTime(c.time)}</span>
        <span><b>Tests:</b> ${c.tests.length}</span>
      </div>
    </div>
  `;
  const edSec=document.getElementById("editor-section");
  edSec.style.display="flex";
  if(!solved.has(id)) document.getElementById("code-input").value=c.starter;
  document.getElementById("results-area").innerHTML="";
  renderHints();
  startTimer();
  renderSidebar();
}

function resetCode(){
  if(activeId===null) return;
  document.getElementById("code-input").value=challenges[activeId].starter;
  document.getElementById("results-area").innerHTML="";
  startTimer();
}

function runCode(){
  const c=challenges[activeId];
  const code=document.getElementById("code-input").value;
  const elapsed=timerStart?Math.floor((Date.now()-timerStart)/1000):0;
  const area=document.getElementById("results-area");
  let passCount=0, rows="";
  for(const t of c.tests){
    try{
      const fn=new Function(code+"\nreturn ("+t.expr+");");
      const result=fn();
      const pass=JSON.stringify(result)===JSON.stringify(t.expected);
      if(pass) passCount++;
      rows+=`<div class="test-row">
        <div class="test-icon ${pass?"pass-icon":"fail-icon"}">${pass?"✓":"✗"}</div>
        <span class="test-expr">${t.expr}</span>
        <span class="test-status">${pass?"passed":"got: "+JSON.stringify(result)}</span>
      </div>`;
    } catch(e){
      rows+=`<div class="test-row">
        <div class="test-icon fail-icon">✗</div>
        <span class="test-expr">${t.expr}</span>
        <span class="test-status" style="color:#A32D2D;">Error: ${e.message}</span>
      </div>`;
    }
  }
  const allPass=passCount===c.tests.length;
  let html=`<div class="results-box"><div class="results-title">${passCount}/${c.tests.length} tests passing</div>${rows}</div>`;
  if(allPass && !solved.has(activeId)){
    stopTimer();
    solved.add(activeId);
    bestTimes[activeId]=elapsed;
    const hintPenalty=(unlockedHints[activeId]||0)*HINT_COST;
    const earned=c.reward;
    balance+=earned;
    const allBest=Object.values(bestTimes);
    const minTime=allBest.length?Math.min(...allBest):null;
    updateStats(minTime);
    html+=`<div class="reward-banner">
      <div>
        <div class="reward-text">Challenge solved in ${fmtTime(elapsed)}! +${earned} VIB earned</div>
        <div class="reward-sub">New balance: ${balance} VIB${hintPenalty>0?" ("+hintPenalty+" VIB spent on hints)":""}</div>
      </div>
    </div>`;
    renderSidebar();
  } else if(allPass){
    html+=`<div class="reward-banner"><div><div class="reward-text">Already solved — no double rewards!</div></div></div>`;
  }
  area.innerHTML=html;
}

function updateStats(bestTime){
  document.getElementById("bal").textContent=balance;
  document.getElementById("stat-earned").textContent=balance+" VIB";
  document.getElementById("stat-solved").textContent=solved.size+" / 10";
  if(bestTime!=null) document.getElementById("stat-time").textContent=fmtTime(bestTime);
  lbData[lbData.length-1].score=balance;
  lbData[lbData.length-1].solved=solved.size;
  const sorted=[...lbData].sort((a,b)=>b.score-a.score);
  const rank=sorted.findIndex(x=>x.isYou)+1;
  document.getElementById("stat-rank").textContent="#"+rank;
  renderLeaderboard();
}

function renderLeaderboard(){
  const sorted=[...lbData].sort((a,b)=>b.score-a.score);
  const medals=["🥇","🥈","🥉"];
  document.getElementById("leaderboard-list").innerHTML=`
    <div class="section-label" style="margin-bottom:8px;">Top solvers</div>
    ${sorted.map((p,i)=>`
      <div class="lb-row">
        <div class="lb-rank">${medals[i]||i+1}</div>
        <div class="lb-avatar">${p.initials}</div>
        <div class="lb-name${p.isYou?" you":""}">${p.name}${p.isYou?" (you)":""}</div>
        <div class="lb-solved">${p.solved} solved</div>
        <div class="lb-score">${p.score} VIB</div>
      </div>
    `).join("")}
  `;
}

renderSidebar();
renderLeaderboard();
</script>
